<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Budget Dashboard - VanJS Hello</title>
    <meta name="description" content="VanJS hello world for a budget dashboard.">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/vanjs-org/van/public/van-1.6.0.nomodule.min.js"></script>
</head>
  <body>
    <main id="app"></main>

    <script type="module">

      const { div, h1, p } = van.tags;
      const app = document.getElementById("app");

      van.add(
        app,
        div(
          { style: "font-family: Georgia, serif; padding: 2rem;" },
          h1("Hello, VanJS!"),
          p("Your budget dashboard starts here.")
        )
      );
    </script>
  </body>
</html>
