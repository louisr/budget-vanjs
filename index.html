<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Live Budget Dashboard</title>
    <meta name="description" content="Live Budget Dashboard with VanJS and local storage config.">
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: Georgia, serif;
        background: #f6f2ec;
        color: #1c1c1c;
        transition: background 200ms ease, color 200ms ease;
      }

      body.dark {
        background: #0f1216;
        color: #f3f1ec;
      }

      h1,
      h2 {
        margin: 0;
      }

      p {
        margin: 0;
      }

      .container {
        min-height: 100vh;
        padding: 1rem 1.75rem 2rem;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding: 0;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .welcome-inline {
        font-size: 0.95rem;
        font-weight: 600;
        opacity: 0.8;
      }

      .card {
        margin-top: 1rem;
        padding: 1.25rem;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        transition: background 200ms ease, border-color 200ms ease;
      }

      body.dark .card {
        background: rgba(20, 24, 30, 0.9);
        border-color: rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      .toggle {
        border: 0;
        border-radius: 999px;
        padding: 0.6rem 1.2rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        background: #1c1c1c;
        color: #f6f2ec;
        transition: transform 150ms ease, background 200ms ease, color 200ms ease;
      }

      body.dark .toggle {
        background: #f6f2ec;
        color: #1c1c1c;
      }

      .toggle:hover {
        transform: translateY(-1px);
      }

      .icon-button {
        border: 1px solid rgba(0, 0, 0, 0.12);
        background: rgba(255, 255, 255, 0.8);
        color: #1c1c1c;
        border-radius: 12px;
        padding: 0.55rem 0.7rem;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: transform 150ms ease, background 200ms ease, border-color 200ms ease;
      }

      body.dark .icon-button {
        background: rgba(18, 22, 28, 0.9);
        color: #f3f1ec;
        border-color: rgba(255, 255, 255, 0.12);
      }

      .icon-button:hover {
        transform: translateY(-1px);
      }

      .icon-button svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
      }

      .stack {
        display: grid;
        gap: 1rem;
      }

      .field {
        display: grid;
        gap: 0.4rem;
      }

      label {
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      input {
        padding: 0.7rem 0.9rem;
        border-radius: 10px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        background: rgba(255, 255, 255, 0.9);
        font-size: 0.95rem;
      }

      body.dark input {
        border-color: rgba(255, 255, 255, 0.2);
        background: rgba(17, 20, 26, 0.9);
        color: #f3f1ec;
      }

      .primary {
        width: fit-content;
        padding: 0.7rem 1.4rem;
        border-radius: 12px;
        border: 0;
        font-weight: 700;
        cursor: pointer;
        background: #2e6bff;
        color: #ffffff;
        transition: transform 150ms ease, filter 150ms ease;
      }

      .primary:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
      }

      .secondary {
        padding: 0.6rem 1.1rem;
        border-radius: 10px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        background: transparent;
        color: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      body.dark .secondary {
        border-color: rgba(255, 255, 255, 0.2);
      }

      .muted {
        font-size: 0.9rem;
        opacity: 0.75;
      }

      .muted-small {
        font-size: 0.8rem;
        opacity: 0.7;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(10, 12, 16, 0.45);
        display: none;
        place-items: center;
        padding: 1.5rem;
        z-index: 100;
      }

      body.modal-open .modal-backdrop {
        display: grid;
      }

      .modal {
        width: min(520px, 100%);
        background: #fefbf7;
        border-radius: 18px;
        padding: 1.6rem;
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
      }

      body.dark .modal {
        background: #141922;
        border-color: rgba(255, 255, 255, 0.08);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }

      .grid {
        display: grid;
        gap: 1rem;
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }

      .card-header-right {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .transactions {
        display: grid;
        gap: 0.75rem;
      }

      .transaction {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.5rem;
        padding: 0.85rem 1rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(0, 0, 0, 0.08);
      }

      body.dark .transaction {
        background: rgba(22, 26, 34, 0.9);
        border-color: rgba(255, 255, 255, 0.08);
      }

      .amount {
        font-weight: 700;
      }

      .pill {
        display: inline-block;
        padding: 0.15rem 0.55rem;
        border-radius: 999px;
        background: rgba(46, 107, 255, 0.12);
        color: #1b3f99;
        font-size: 0.75rem;
        font-weight: 600;
      }

      body.dark .pill {
        background: rgba(120, 164, 255, 0.2);
        color: #cfe0ff;
      }

      footer {
        margin-top: 2.5rem;
        padding-top: 1rem;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: space-between;
        align-items: center;
        font-size: 0.9rem;
      }

      body.dark footer {
        border-top-color: rgba(255, 255, 255, 0.08);
      }

      a {
        color: inherit;
        text-decoration: none;
        font-weight: 600;
      }

      a:hover {
        text-decoration: underline;
      }

      .link-button {
        background: none;
        border: 0;
        padding: 0;
        font: inherit;
        color: inherit;
        cursor: pointer;
        font-weight: 600;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>

    <script type="module">
      import van from "https://cdn.jsdelivr.net/gh/vanjs-org/van/public/van-1.6.0.min.js"
      
      const { a, button, div, footer, h1, h2, input, label, p, span } = van.tags;
      const createSvgElement = (tag, props, ...children) => {
        const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
        if (props) {
          Object.entries(props).forEach(([key, value]) => {
            if (value == null) return;
            el.setAttribute(key, value);
          });
        }
        children.flat().forEach((child) => {
          if (child == null) return;
          el.append(child.nodeType ? child : document.createTextNode(child));
        });
        return el;
      };
      const svg = {
        svg: (props, ...children) => createSvgElement("svg", props, ...children),
        path: (props) => createSvgElement("path", props)
      };
      const app = document.getElementById("app");
      const isDark = van.state(false);
      const storageKey = "budgetDashboardConfig";
      const dataKey = "budgetDashboardData";
      const themeKey = "budgetDashboardTheme";
      const route = van.state("dashboard");

      const loadConfig = () => {
        try {
          const raw = localStorage.getItem(storageKey);
          return raw ? JSON.parse(raw) : null;
        } catch (error) {
          return null;
        }
      };

      const saveConfig = (config) => {
        localStorage.setItem(storageKey, JSON.stringify(config));
      };

      const loadData = () => {
        try {
          const raw = localStorage.getItem(dataKey);
          return raw ? JSON.parse(raw) : { transactions: [], lastSync: null };
        } catch (error) {
          return { transactions: [], lastSync: null };
        }
      };

      const loadTheme = () => {
        try {
          return localStorage.getItem(themeKey) === "dark";
        } catch (error) {
          return false;
        }
      };

      const saveTheme = (darkMode) => {
        localStorage.setItem(themeKey, darkMode ? "dark" : "light");
      };

      const saveData = (data) => {
        localStorage.setItem(dataKey, JSON.stringify(data));
      };

      const config = van.state(loadConfig());
      const data = van.state(loadData());
      const firstName = van.state("");
      const plaidClientId = van.state("");
      const plaidSecret = van.state("");

      const applyTheme = (darkMode) => {
        document.body.classList.toggle("dark", darkMode);
      };

      isDark.val = loadTheme();
      applyTheme(isDark.val);

      const toggleTheme = () => {
        isDark.val = !isDark.val;
        applyTheme(isDark.val);
        saveTheme(isDark.val);
      };

      const syncRouteFromHash = () => {
        route.val = window.location.hash === "#about" ? "about" : "dashboard";
      };

      syncRouteFromHash();
      window.addEventListener("hashchange", syncRouteFromHash);

      const openSettings = () => {
        const current = config.val;
        firstName.val = current?.firstName || "";
        plaidClientId.val = current?.plaidClientId || "";
        plaidSecret.val = current?.plaidSecret || "";
        document.body.classList.add("modal-open");
      };

      const closeSettings = () => {
        document.body.classList.remove("modal-open");
      };

      const handleConfigSubmit = (event) => {
        event.preventDefault();
        const payload = {
          firstName: firstName.val.trim(),
          plaidClientId: plaidClientId.val.trim(),
          plaidSecret: plaidSecret.val.trim()
        };

        if (!payload.firstName || !payload.plaidClientId || !payload.plaidSecret) {
          return;
        }

        saveConfig(payload);
        config.val = payload;
        firstName.val = "";
        plaidClientId.val = "";
        plaidSecret.val = "";
        closeSettings();
      };

      const connectPlaidSandbox = () => {
        const sampleTransactions = [
          { id: "txn-1", name: "Green Market", amount: -42.18, date: "2026-05-01", category: "Groceries" },
          { id: "txn-2", name: "Bright Utilities", amount: -86.4, date: "2026-04-29", category: "Utilities" },
          { id: "txn-3", name: "Payroll", amount: 1850.0, date: "2026-04-28", category: "Income" },
          { id: "txn-4", name: "Metro Transit", amount: -18.0, date: "2026-04-27", category: "Transport" }
        ];
        const updated = {
          transactions: sampleTransactions,
          lastSync: new Date().toISOString()
        };
        saveData(updated);
        data.val = updated;
      };

      const settingsModal = div(
        { class: "modal-backdrop", onclick: closeSettings },
        div(
          {
            class: "modal stack",
            role: "dialog",
            "aria-modal": "true",
            onclick: (event) => event.stopPropagation()
          },
          div(
            { class: "modal-header" },
            h2("Settings"),
            button({ class: "secondary", type: "button", onclick: closeSettings }, "Close")
          ),
          div(
            { class: "stack" },
            button(
              { class: "toggle", type: "button", onclick: toggleTheme },
              () => (isDark.val ? "Light mode" : "Dark mode")
            ),
            van.tags.form(
              { class: "stack", onsubmit: handleConfigSubmit },
              div(
                { class: "field" },
                label({ for: "first-name" }, "First name"),
                input({
                  id: "first-name",
                  name: "first-name",
                  type: "text",
                  placeholder: "Jordan",
                  required: true,
                  value: () => firstName.val,
                  oninput: (event) => firstName.val = event.target.value
                })
              ),
              div(
                { class: "field" },
                label({ for: "plaid-client-id" }, "Plaid client ID"),
                input({
                  id: "plaid-client-id",
                  name: "plaid-client-id",
                  type: "text",
                  placeholder: "client-id",
                  required: true,
                  value: () => plaidClientId.val,
                  oninput: (event) => plaidClientId.val = event.target.value
                })
              ),
              div(
                { class: "field" },
                label({ for: "plaid-secret" }, "Plaid secret"),
                input({
                  id: "plaid-secret",
                  name: "plaid-secret",
                  type: "password",
                  placeholder: "secret",
                  required: true,
                  value: () => plaidSecret.val,
                  oninput: (event) => plaidSecret.val = event.target.value
                })
              ),
              button({ class: "primary", type: "submit" }, "Save settings")
            )
          )
        )
      );

      const header = () => div(
        { class: "toolbar" },
        h1("Live Budget Dashboard"),
        div(
          { class: "header-actions" },
          config.val ? span({ class: "welcome-inline" }, `Welcome, ${config.val.firstName}!`) : null,
          button(
            {
              class: "icon-button",
              type: "button",
              onclick: openSettings,
              "aria-label": "Open settings"
            },
            svg.svg(
              { viewBox: "0 0 24 24", fill: "none", "aria-hidden": "true" },
              svg.path({
                d: "M12 8.25a3.75 3.75 0 1 0 0 7.5 3.75 3.75 0 0 0 0-7.5Zm8.25 3.75a6.2 6.2 0 0 0-.1-1.1l2-1.55-1.9-3.3-2.4.8a7 7 0 0 0-1.9-1.1l-.4-2.5h-3.8l-.4 2.5a7 7 0 0 0-1.9 1.1l-2.4-.8-1.9 3.3 2 1.55a6.2 6.2 0 0 0 0 2.2l-2 1.55 1.9 3.3 2.4-.8a7 7 0 0 0 1.9 1.1l.4 2.5h3.8l.4-2.5a7 7 0 0 0 1.9-1.1l2.4.8 1.9-3.3-2-1.55c.07-.36.1-.73.1-1.1Z",
                stroke: "currentColor",
                "stroke-width": "1.5",
                "stroke-linecap": "round",
                "stroke-linejoin": "round"
              })
            )
          )
        )
      );

      const dashboard = () => config.val
        ? div(
            { class: "grid" },
            div(
              { class: "card stack" },
              div(
                { class: "card-header" },
                h2("Recent transactions"),
                div(
                  { class: "card-header-right" },
                  data.val.lastSync
                    ? span({ class: "muted-small" }, `Last sync: ${new Date(data.val.lastSync).toLocaleString()}`)
                    : null,
                  button(
                    {
                      class: "link-button",
                      type: "button",
                      onclick: connectPlaidSandbox
                    },
                    "Sync now"
                  )
                )
              ),
              data.val.transactions.length
                ? div(
                    { class: "transactions" },
                    data.val.transactions.map((transaction) =>
                      div(
                        { class: "transaction" },
                        div(
                          { class: "stack" },
                          span(transaction.name),
                          span({ class: "pill" }, transaction.category),
                          span({ class: "muted" }, transaction.date)
                        ),
                        span(
                          { class: "amount" },
                          `${transaction.amount < 0 ? "-" : "+"}$${Math.abs(transaction.amount).toFixed(2)}`
                        )
                      )
                    )
                  )
                : p({ class: "muted" }, "No transactions yet. Connect Plaid to pull data.")
            )
          )
        : div(
            { class: "card stack" },
            h2("Set up your dashboard"),
            p("We store your configuration in localStorage so this site can run on GitHub Pages."),
            button({ class: "primary", type: "button", onclick: openSettings }, "Open settings")
          );

      const aboutPage = () => div(
        { class: "card stack" },
        h2("About this page"),
        p("This is a single-page VanJS app hosted on GitHub Pages."),
        p("It stores configuration and sample budget data in localStorage for a fully static experience."),
        p("Routing is handled with URL hashes so refreshing keeps the current view.")
      );

      const mainContent = () => route.val === "about" ? aboutPage() : dashboard();

      const pageFooter = () => footer(
        div("© Cogitatio LLC 2026"),
        div(
          route.val === "about"
            ? a({ href: "#/" }, "Back to dashboard")
            : a({ href: "#about" }, "About this page")
        )
      );

      van.add(
        app,
        div(
          { class: "container" },
          () => header(),
          () => mainContent(),
          pageFooter
        ),
        settingsModal
      );
    </script>
  </body>
</html>
